<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhisperDSN — Deep Space Network Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Instrument+Serif&display=swap');

  :root {
    --void: #05070a;
    --panel: #0a0f18;
    --line: #111a2a;
    --text: #c8d6e5;
    --dim: #4a5568;
    --muted: #2d3748;
    --gold: #d4a26a;
    --gold-glow: rgba(212,162,106,0.15);
    --blue: #5b8fb9;
    --blue-glow: rgba(91,143,185,0.12);
    --green: #6abf8a;
    --red: #e07070;
    --red-glow: rgba(224,112,112,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas { display: block; }

  .title-card {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 100;
    pointer-events: none;
  }
  .title-card h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .title-card .sub {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .legend {
    position: fixed;
    bottom: 24px;
    left: 32px;
    z-index: 100;
    pointer-events: none;
  }
  .legend div {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .dot-up { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .dot-down { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .dot-both { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-idle { background: var(--muted); }

  .station-label {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    text-align: center;
  }
  .station-label .name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 1px;
  }
  .station-label .loc {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sc-tooltip {
    position: fixed;
    z-index: 200;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .sc-tooltip.visible { opacity: 1; }
  .sc-tooltip .sc-name {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .sc-tooltip .sc-meta {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .sc-tooltip .sc-detail {
    font-size: 11px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-line;
  }
  .sc-tooltip .sc-desc {
    font-size: 10px;
    color: var(--dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  .status-bar {
    position: fixed;
    top: 28px;
    right: 32px;
    z-index: 100;
    text-align: right;
    pointer-events: none;
  }
  .status-bar .ts {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .status-bar .active-count {
    font-size: 11px;
    color: var(--gold);
    margin-top: 2px;
  }

  .source-link {
    position: fixed;
    bottom: 24px;
    right: 32px;
    z-index: 100;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .source-link a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .source-link a:hover { color: var(--gold); }

  .light-counter {
    position: fixed;
    bottom: 42px;
    right: 32px;
    z-index: 100;
    pointer-events: none;
    text-align: right;
  }
  .light-counter .light-value {
    font-size: 13px;
    color: var(--dim);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .light-counter .light-label {
    display: block;
    font-size: 8px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .audio-toggle {
    position: fixed;
    top: 80px;
    right: 32px;
    z-index: 100;
    background: none;
    border: 1px solid var(--line);
    border-radius: 4px;
    color: var(--dim);
    font-size: 16px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  .audio-toggle:hover { color: var(--gold); border-color: var(--gold); }
  .audio-toggle.active { color: var(--gold); border-color: var(--gold); }

  @media (max-width: 600px) {
    .title-card { top: 16px; left: 16px; }
    .title-card h1 { font-size: 18px; }
    .title-card .sub { font-size: 8px; }
    .status-bar { top: 16px; right: 16px; }
    .legend { bottom: 16px; left: 16px; }
    .legend div { font-size: 8px; }
    .source-link { bottom: 16px; right: 16px; font-size: 8px; }
    .light-counter { bottom: 34px; right: 16px; }
    .light-counter .light-value { font-size: 11px; }
    .audio-toggle { top: 60px; right: 16px; width: 28px; height: 28px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="title-card">
  <h1>WhisperDSN</h1>
  <div class="sub">Deep Space Network — Live</div>
</div>

<div class="status-bar">
  <div class="ts" id="timestamp">connecting...</div>
  <div class="active-count" id="active-count"></div>
</div>

<div class="legend">
  <div><span class="dot dot-up"></span>Transmitting to spacecraft</div>
  <div><span class="dot dot-down"></span>Receiving from spacecraft</div>
  <div><span class="dot dot-both"></span>Two-way link</div>
  <div><span class="dot dot-idle"></span>Idle / maintenance</div>
</div>

<div class="light-counter">
  <span class="light-value" id="light-value">0</span>
  <span class="light-label">seconds of light travelling</span>
</div>

<div class="source-link">
  <a href="https://eyes.nasa.gov/apps/dsn-now/dsn.html" target="_blank">data: nasa/jpl dsn</a>
</div>

<button class="audio-toggle" id="audio-toggle" title="Toggle ambient audio">&#9834;</button>

<div class="sc-tooltip" id="tooltip">
  <div class="sc-name" id="tt-name"></div>
  <div class="sc-meta" id="tt-meta"></div>
  <div class="sc-detail" id="tt-detail"></div>
  <div class="sc-desc" id="tt-desc"></div>
</div>

<canvas id="c"></canvas>

<script>
// ── Spacecraft Names ─────────────────────────────────────────────────
// Dynamically populated from Worker (sourced from NASA's config.xml)
// Fallback names used only for embedded snapshot
let spacecraftNames = {};

// ── Worker endpoint ──────────────────────────────────────────────────
// Update this after deploying the Cloudflare Worker
const WORKER_URL = 'https://dsn-proxy.chris-bateman.workers.dev/';

// ── Canvas & State ───────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H;
let connections = [];
let particles = [];
let stars = [];
let mouseX = -1, mouseY = -1;
let lightTarget = 0, lightDisplay = 0;
let isMobile = false;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  isMobile = W < 600;
  initStarfield();
}
window.addEventListener('resize', resize);
resize();

// ── Starfield ────────────────────────────────────────────────────────
function initStarfield() {
  const count = isMobile ? 100 : 200;
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.75,
      brightness: 0.1 + Math.random() * 0.3,
      twinkleSpeed: 0.0005 + Math.random() * 0.002,
      twinklePhase: Math.random() * Math.PI * 2,
    });
  }
}

function drawStarfield(t) {
  stars.forEach(s => {
    const alpha = s.brightness * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinklePhase));
    ctx.fillStyle = `rgba(200,214,229,${alpha})`;
    ctx.fillRect(s.x, s.y, 1, 1);
  });
}

// ── Station Positions ────────────────────────────────────────────────
function getStationPositions() {
  if (isMobile) {
    return [
      { id: 'gdscc', name: 'Goldstone', loc: 'California, USA', x: W * 0.5, y: H * 0.72 },
      { id: 'mdscc', name: 'Madrid', loc: 'Robledo, Spain', x: W * 0.5, y: H * 0.82 },
      { id: 'cdscc', name: 'Canberra', loc: 'Tidbinbilla, Australia', x: W * 0.5, y: H * 0.92 },
    ];
  }
  const y = H * 0.82;
  return [
    { id: 'gdscc', name: 'Goldstone', loc: 'California, USA', x: W * 0.2, y },
    { id: 'mdscc', name: 'Madrid', loc: 'Robledo, Spain', x: W * 0.5, y },
    { id: 'cdscc', name: 'Canberra', loc: 'Tidbinbilla, Australia', x: W * 0.8, y },
  ];
}

// ── Formatting ───────────────────────────────────────────────────────
function formatDistance(km) {
  if (km < 0) return '—';
  if (km < 1000) return km.toFixed(0) + ' km';
  if (km < 1e6) return (km / 1e3).toFixed(0) + ',000 km';
  if (km < 1e9) return (km / 1e6).toFixed(1) + 'M km';
  return (km / 1e9).toFixed(2) + 'B km';
}

function formatLightTime(seconds) {
  if (seconds < 0 || seconds === 0) return '—';
  if (seconds < 60) return seconds.toFixed(1) + 's';
  if (seconds < 3600) return (seconds / 60).toFixed(1) + ' min';
  return (seconds / 3600).toFixed(1) + ' hrs';
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// ── XML Parser (for embedded snapshot fallback) ──────────────────────
function parseDSN(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const dishEls = doc.querySelectorAll('dish');
  const positions = getStationPositions();
  const newConnections = [];

  dishEls.forEach(dish => {
    let prev = dish.previousElementSibling;
    while (prev && prev.tagName !== 'station') prev = prev.previousElementSibling;
    if (!prev) {
      let node = dish;
      while (node.previousElementSibling) {
        node = node.previousElementSibling;
        if (node.tagName === 'station') { prev = node; break; }
      }
    }
    if (!prev) return;

    const stationId = prev.getAttribute('name');
    const stationPos = positions.find(p => p.id === stationId);
    if (!stationPos) return;

    const dishName = dish.getAttribute('name');
    const activity = dish.getAttribute('activity');
    const targets = dish.querySelectorAll('target');
    const upSignals = dish.querySelectorAll('upSignal');
    const downSignals = dish.querySelectorAll('downSignal');

    const hasActiveUp = Array.from(upSignals).some(s => s.getAttribute('active') === 'true');
    const hasActiveDown = Array.from(downSignals).some(s => s.getAttribute('active') === 'true');

    targets.forEach(target => {
      const scId = target.getAttribute('name');
      if (['DSN', 'DSS', 'GBRA', 'TEST', 'DOUG', 'SHAN'].includes(scId)) return;

      const range = parseFloat(target.getAttribute('downlegRange'));
      const rtlt = parseFloat(target.getAttribute('rtlt'));
      if (range <= 0) return;

      const maxDataRate = Math.max(
        ...Array.from(downSignals).map(s => parseFloat(s.getAttribute('dataRate')) || 0),
        ...Array.from(upSignals).map(s => parseFloat(s.getAttribute('dataRate')) || 0)
      );

      newConnections.push({
        station: stationPos, dish: dishName, scId, range, rtlt,
        hasActiveUp, hasActiveDown, activity, dataRate: maxDataRate,
        targetX: 0, targetY: 0, renderX: 0, renderY: 0,
      });
    });
  });

  const ts = doc.querySelector('timestamp');
  if (ts) {
    const d = new Date(parseInt(ts.textContent));
    document.getElementById('timestamp').textContent = d.toUTCString().replace('GMT', 'UTC');
  }

  layoutConnections(newConnections);
}

// ── JSON Parser (for Worker endpoint) ────────────────────────────────
function parseDSNJSON(data) {
  // Merge spacecraft names from Worker (sourced from NASA's config.xml)
  if (data.spacecraft) {
    Object.assign(spacecraftNames, data.spacecraft);
  }

  const positions = getStationPositions();
  const newConnections = [];

  if (data.timestamp) {
    const d = new Date(data.timestamp);
    document.getElementById('timestamp').textContent = d.toUTCString().replace('GMT', 'UTC');
  }

  (data.stations || []).forEach(station => {
    const stationPos = positions.find(p => p.id === station.id);
    if (!stationPos) return;

    (station.dishes || []).forEach(dish => {
      (dish.targets || []).forEach(target => {
        newConnections.push({
          station: stationPos,
          dish: dish.name,
          scId: target.id,
          range: target.downlegRange,
          rtlt: target.rtlt,
          hasActiveUp: target.upSignalActive,
          hasActiveDown: target.downSignalActive,
          activity: dish.activity,
          dataRate: target.dataRate,
          targetX: 0, targetY: 0, renderX: 0, renderY: 0,
        });
      });
    });
  });

  layoutConnections(newConnections);
}

// ── Layout: dedup, position, smooth handoff ──────────────────────────
function layoutConnections(newConnections) {
  // Deduplicate — one entry per spacecraft, prefer active
  const scMap = {};
  newConnections.forEach(c => {
    if (!scMap[c.scId] || (c.hasActiveUp || c.hasActiveDown)) {
      scMap[c.scId] = c;
    }
  });

  const conns = Object.values(scMap);
  const maxRange = Math.max(...conns.map(c => c.range), 1);
  const skyTop = H * (isMobile ? 0.04 : 0.06);
  const skyBottom = H * (isMobile ? 0.45 : 0.55);

  // Group by station for fan-out spreading
  const byStation = {};
  conns.forEach(c => {
    const sid = c.station.id;
    if (!byStation[sid]) byStation[sid] = [];
    byStation[sid].push(c);
  });

  Object.values(byStation).forEach(group => {
    group.sort((a, b) => a.range - b.range);
    const n = group.length;
    const stationX = group[0].station.x;
    const spread = isMobile ? W * 0.8 : W * 0.25;

    group.forEach((c, i) => {
      // Vertical: log-scale distance
      const logDist = Math.log10(Math.max(c.range, 100));
      const maxLog = Math.log10(Math.max(maxRange, 100));
      const yRatio = 1 - (logDist / maxLog);
      c.targetY = skyTop + yRatio * (skyBottom - skyTop);

      // Horizontal: even fan from station center
      const slot = n > 1 ? (i / (n - 1)) - 0.5 : 0;
      const hashJitter = ((hashCode(c.scId) % 50) / 50 - 0.5) * 30;
      c.targetX = Math.min(W - 60, Math.max(60, stationX + slot * spread + hashJitter));
    });
  });

  // Carry over render positions from previous frame for smooth interpolation
  const prevMap = {};
  connections.forEach(c => { prevMap[c.scId] = c; });

  conns.forEach(c => {
    const prev = prevMap[c.scId];
    if (prev) {
      c.renderX = prev.renderX;
      c.renderY = prev.renderY;
    } else {
      c.renderX = c.targetX;
      c.renderY = c.targetY;
    }
  });

  connections = conns;

  // Update active count
  const activeCount = conns.filter(c => c.hasActiveUp || c.hasActiveDown).length;
  document.getElementById('active-count').textContent = activeCount + ' active links';

  // Update light travelling target
  lightTarget = conns
    .filter(c => c.hasActiveUp || c.hasActiveDown)
    .reduce((sum, c) => sum + (c.rtlt > 0 ? c.rtlt / 2 : 0), 0);
}

// ── Particles ────────────────────────────────────────────────────────
const MAX_LOG_RANGE = Math.log10(25e9); // ~Voyager distance

function spawnParticles() {
  connections.forEach(c => {
    if (!c.hasActiveUp && !c.hasActiveDown) return;
    if (Math.random() > 0.03) return;

    const goingUp = c.hasActiveUp && (!c.hasActiveDown || Math.random() > 0.5);

    // Speed scales inversely with log distance
    const logRange = Math.log10(Math.max(c.range, 1000));
    const speedFactor = Math.max(1 - (logRange / MAX_LOG_RANGE) * 0.85, 0.15);
    const speed = (0.004 + Math.random() * 0.004) * speedFactor;

    particles.push({
      sx: goingUp ? c.station.x : c.renderX,
      sy: goingUp ? c.station.y : c.renderY,
      tx: goingUp ? c.renderX : c.station.x,
      ty: goingUp ? c.renderY : c.station.y,
      progress: 0,
      speed,
      r: goingUp ? 212 : 91,
      g: goingUp ? 162 : 143,
      b: goingUp ? 106 : 185,
    });
  });
}

// ── Draw ─────────────────────────────────────────────────────────────
function draw(t) {
  // Clear with fade trail
  ctx.fillStyle = 'rgba(5,7,10,0.15)';
  ctx.fillRect(0, 0, W, H);

  // Starfield
  drawStarfield(t);

  // Smooth interpolation for all connections
  connections.forEach(c => {
    c.renderX += (c.targetX - c.renderX) * 0.05;
    c.renderY += (c.targetY - c.renderY) * 0.05;
  });

  // Smooth light counter
  lightDisplay += (lightTarget - lightDisplay) * 0.05;
  document.getElementById('light-value').textContent = Math.round(lightDisplay).toLocaleString();

  const stationPositions = getStationPositions();

  // Draw connections
  connections.forEach(c => {
    const active = c.hasActiveUp || c.hasActiveDown;
    ctx.beginPath();
    ctx.moveTo(c.station.x, c.station.y);
    ctx.lineTo(c.renderX, c.renderY);
    if (active) {
      const both = c.hasActiveUp && c.hasActiveDown;
      ctx.strokeStyle = both ? 'rgba(106,191,138,0.08)' :
                        c.hasActiveDown ? 'rgba(91,143,185,0.08)' :
                        'rgba(212,162,106,0.08)';
      ctx.lineWidth = 1;
    } else {
      ctx.strokeStyle = 'rgba(45,55,72,0.04)';
      ctx.lineWidth = 0.5;
    }
    ctx.stroke();

    // Spacecraft dot
    const scName = spacecraftNames[c.scId];
    const dotR = active ? 3 : 2;
    ctx.beginPath();
    ctx.arc(c.renderX, c.renderY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = active ? (c.hasActiveUp && c.hasActiveDown ? '#6abf8a' : c.hasActiveDown ? '#5b8fb9' : '#d4a26a') : '#2d3748';
    ctx.fill();

    // Spacecraft label
    const label = scName || c.scId;
    ctx.font = '9px "IBM Plex Mono"';
    ctx.fillStyle = active ? 'rgba(200,214,229,0.6)' : 'rgba(74,85,104,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText(label, c.renderX, c.renderY - 8);

    // Distance label
    if (active) {
      ctx.font = '8px "IBM Plex Mono"';
      ctx.fillStyle = 'rgba(74,85,104,0.5)';
      ctx.fillText(formatDistance(c.range), c.renderX, c.renderY + 14);
    }
  });

  // Draw particles
  spawnParticles();
  particles = particles.filter(p => p.progress < 1);
  particles.forEach(p => {
    p.progress += p.speed;
    const x = p.sx + (p.tx - p.sx) * p.progress;
    const y = p.sy + (p.ty - p.sy) * p.progress;
    const alpha = Math.sin(p.progress * Math.PI) * 0.8;

    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
    ctx.fill();
  });

  // Draw stations
  stationPositions.forEach(s => {
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 30);
    grad.addColorStop(0, 'rgba(212,162,106,0.12)');
    grad.addColorStop(1, 'rgba(212,162,106,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(s.x - 30, s.y - 30, 60, 60);

    ctx.beginPath();
    ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a26a';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(212,162,106,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = '11px "IBM Plex Mono"';
    ctx.fillStyle = '#c8d6e5';
    ctx.textAlign = 'center';
    ctx.fillText(s.name, s.x, s.y + 24);
    ctx.font = '8px "IBM Plex Mono"';
    ctx.fillStyle = 'rgba(74,85,104,0.7)';
    ctx.fillText(s.loc, s.x, s.y + 36);
  });

  checkHover();
  requestAnimationFrame(draw);
}

// ── Hover / Tooltip ──────────────────────────────────────────────────
function checkHover() {
  if (mouseX < 0) return;
  let found = null;
  let minDist = 20;

  connections.forEach(c => {
    const dx = mouseX - c.renderX;
    const dy = mouseY - c.renderY;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < minDist) {
      minDist = d;
      found = c;
    }
  });

  if (found) {
    const scName = spacecraftNames[found.scId];
    document.getElementById('tt-name').textContent = scName || found.scId;
    document.getElementById('tt-meta').textContent = found.dish + ' \u2192 ' + found.station.name;

    let detail = '';
    detail += 'Distance: ' + formatDistance(found.range) + '\n';
    detail += 'Light time: ' + formatLightTime(found.rtlt) + '\n';
    if (found.dataRate > 0) detail += 'Data rate: ' + (found.dataRate / 1000).toFixed(1) + ' kb/s\n';
    detail += 'Band: ' + found.activity;
    document.getElementById('tt-detail').textContent = detail;
    document.getElementById('tt-desc').textContent = '';

    tooltip.style.left = Math.min(mouseX + 16, W - 280) + 'px';
    tooltip.style.top = (mouseY - 20) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
}

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mouseleave', () => {
  mouseX = -1;
  tooltip.classList.remove('visible');
});

// ── Audio ────────────────────────────────────────────────────────────
let audioCtx = null;
let audioEnabled = false;
let oscillators = {};

const audioToggle = document.getElementById('audio-toggle');
audioToggle.addEventListener('click', () => {
  audioEnabled = !audioEnabled;
  audioToggle.classList.toggle('active', audioEnabled);
  if (audioEnabled) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    updateAudio();
  } else {
    stopAllAudio();
  }
});

function updateAudio() {
  if (!audioEnabled || !audioCtx) return;

  const activeIds = new Set();
  connections.forEach(c => {
    if (!c.hasActiveUp && !c.hasActiveDown) return;
    activeIds.add(c.scId);

    if (!oscillators[c.scId]) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.value = 0;
      osc.start();
      oscillators[c.scId] = { osc, gain };
    }

    const logRange = Math.log10(Math.max(c.range, 1000));
    const freq = 400 - (logRange / MAX_LOG_RANGE) * 340;
    oscillators[c.scId].osc.frequency.setTargetAtTime(Math.max(freq, 60), audioCtx.currentTime, 0.1);
    oscillators[c.scId].gain.gain.setTargetAtTime(0.03, audioCtx.currentTime, 0.3);
  });

  // Fade out removed connections
  Object.keys(oscillators).forEach(id => {
    if (!activeIds.has(id)) {
      oscillators[id].gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
      const o = oscillators[id];
      setTimeout(() => { o.osc.stop(); o.osc.disconnect(); o.gain.disconnect(); }, 1000);
      delete oscillators[id];
    }
  });
}

function stopAllAudio() {
  Object.values(oscillators).forEach(o => {
    o.gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    setTimeout(() => { o.osc.stop(); o.osc.disconnect(); o.gain.disconnect(); }, 500);
  });
  oscillators = {};
}

async function fetchDSN() {
  // Try Worker endpoint first
  try {
    const resp = await fetch(WORKER_URL);
    if (resp.ok) {
      const data = await resp.json();
      parseDSNJSON(data);
      if (audioEnabled) updateAudio();
      return;
    }
  } catch(e) {}

  // Fallback: try NASA directly (will CORS-block in most browsers)
  try {
    const resp = await fetch('https://eyes.jpl.nasa.gov/dsn/data/dsn.xml');
    if (resp.ok) {
      const text = await resp.text();
      parseDSN(text);
      if (audioEnabled) updateAudio();
      return;
    }
  } catch(e) {}

  // Last resort: embedded snapshot
  parseDSN(DSN_SNAPSHOT);
  if (audioEnabled) updateAudio();
}
