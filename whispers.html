<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whispers to the Void — Deep Space Network Live</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Instrument+Serif&display=swap');

  :root {
    --void: #05070a;
    --panel: #0a0f18;
    --line: #111a2a;
    --text: #c8d6e5;
    --dim: #4a5568;
    --muted: #2d3748;
    --gold: #d4a26a;
    --gold-glow: rgba(212,162,106,0.15);
    --blue: #5b8fb9;
    --blue-glow: rgba(91,143,185,0.12);
    --green: #6abf8a;
    --red: #e07070;
    --red-glow: rgba(224,112,112,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  canvas { display: block; }

  .title-card {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 100;
    pointer-events: none;
  }
  .title-card h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .title-card .sub {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .legend {
    position: fixed;
    bottom: 24px;
    left: 32px;
    z-index: 100;
    pointer-events: none;
  }
  .legend div {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .legend .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .dot-up { background: var(--gold); box-shadow: 0 0 6px var(--gold); }
  .dot-down { background: var(--blue); box-shadow: 0 0 6px var(--blue); }
  .dot-both { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-idle { background: var(--muted); }

  .station-label {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    text-align: center;
  }
  .station-label .name {
    font-size: 11px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 1px;
  }
  .station-label .loc {
    font-size: 8px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sc-tooltip {
    position: fixed;
    z-index: 200;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .sc-tooltip.visible { opacity: 1; }
  .sc-tooltip .sc-name {
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
    color: var(--gold);
    margin-bottom: 4px;
  }
  .sc-tooltip .sc-meta {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .sc-tooltip .sc-detail {
    font-size: 11px;
    color: var(--text);
    line-height: 1.6;
  }
  .sc-tooltip .sc-desc {
    font-size: 10px;
    color: var(--dim);
    margin-top: 6px;
    line-height: 1.5;
  }

  .status-bar {
    position: fixed;
    top: 28px;
    right: 32px;
    z-index: 100;
    text-align: right;
    pointer-events: none;
  }
  .status-bar .ts {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .status-bar .active-count {
    font-size: 11px;
    color: var(--gold);
    margin-top: 2px;
  }

  .source-link {
    position: fixed;
    bottom: 24px;
    right: 32px;
    z-index: 100;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .source-link a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .source-link a:hover { color: var(--gold); }
</style>
</head>
<body>

<div class="title-card">
  <h1>Whispers to the Void</h1>
  <div class="sub">Deep Space Network — Live</div>
</div>

<div class="status-bar">
  <div class="ts" id="timestamp">connecting...</div>
  <div class="active-count" id="active-count"></div>
</div>

<div class="legend">
  <div><span class="dot dot-up"></span>Transmitting to spacecraft</div>
  <div><span class="dot dot-down"></span>Receiving from spacecraft</div>
  <div><span class="dot dot-both"></span>Two-way link</div>
  <div><span class="dot dot-idle"></span>Idle / maintenance</div>
</div>

<div class="source-link">
  <a href="https://eyes.nasa.gov/apps/dsn-now/dsn.html" target="_blank">data: nasa/jpl dsn</a>
</div>

<div class="sc-tooltip" id="tooltip">
  <div class="sc-name" id="tt-name"></div>
  <div class="sc-meta" id="tt-meta"></div>
  <div class="sc-detail" id="tt-detail"></div>
  <div class="sc-desc" id="tt-desc"></div>
</div>

<canvas id="c"></canvas>

<script>
const SPACECRAFT = {

  'CHDR': { full: 'Chandra X-ray Observatory', desc: 'Space telescope observing X-rays from hot regions of the universe. Launched 1999.' },

  'EURC': { full: 'Europa Clipper', desc: 'NASA mission to investigate Jupiter\'s moon Europa. Launched Oct 2024, arriving ~2030.' },
  'GAIA': { full: 'Gaia', desc: 'ESA space observatory mapping a billion stars in the Milky Way. Launched 2013.' },

  'LRO': { full: 'Lunar Reconnaissance Orbiter', desc: 'Mapping the Moon\'s surface in detail since 2009. Supports future lunar exploration.' },
  'M01O': { full: 'Mars Odyssey', desc: 'Orbiting Mars since 2001. Studies minerals, radiation, and relays data from surface rovers.' },
  'M20': { full: 'Perseverance Rover', desc: 'Exploring Jezero Crater on Mars. Collecting samples for future Earth return. Landed Feb 2021.' },
  'MAVEN': { full: 'MAVEN', desc: 'Mars Atmosphere and Volatile Evolution. Studies how Mars lost its atmosphere.' },
  'MEX': { full: 'Mars Express', desc: 'ESA\'s first Mars mission. Orbiting since 2003 studying the surface, subsurface, and atmosphere.' },
  'MRO': { full: 'Mars Reconnaissance Orbiter', desc: 'High-resolution imaging of Mars since 2006. Key relay satellite for surface missions.' },
  'MSL': { full: 'Curiosity Rover', desc: 'Exploring Gale Crater on Mars since 2012. Found ancient habitable environments.' },
  'MVN': { full: 'MAVEN', desc: 'Studying the Martian upper atmosphere and solar wind interaction.' },
  'NHPC': { full: 'New Horizons', desc: 'First spacecraft to visit Pluto (2015). Now exploring the Kuiper Belt.' },
  'NSYT': { full: 'InSight Lander', desc: 'Studied the interior of Mars. Mission ended Dec 2022.' },
  'OSIRIS-APEX': { full: 'OSIRIS-APEX', desc: 'Extended mission heading to asteroid Apophis. Arriving 2029.' },
  'PSYC': { full: 'Psyche', desc: 'Heading to metal asteroid 16 Psyche. Launched Oct 2023, arriving Aug 2029.' },
  'SOHO': { full: 'SOHO', desc: 'Solar and Heliospheric Observatory at L1. Watching the Sun since 1995.' },
  'SPP': { full: 'Parker Solar Probe', desc: 'Flying through the Sun\'s corona. The fastest human-made object ever built.' },
  'STER-A': { full: 'STEREO-A', desc: 'Solar observatory providing 3D views of the Sun. Launched 2006.' },
  'TESS': { full: 'TESS', desc: 'Transiting Exoplanet Survey Satellite. Hunting for planets around nearby stars.' },
  'VGR1': { full: 'Voyager 1', desc: 'The most distant human-made object. Over 24 billion km from Earth. Launched 1977.' },
  'VGR2': { full: 'Voyager 2', desc: 'Exploring interstellar space. The only spacecraft to visit Uranus and Neptune. Launched 1977.' },
  'WIND': { full: 'Wind', desc: 'Studies the solar wind upstream of Earth. Operating since 1994.' },
  'XMM': { full: 'XMM-Newton', desc: 'ESA\'s X-ray space telescope. Studying black holes, neutron stars, and galaxy clusters since 1999.' },
  'LUCY': { full: 'Lucy', desc: 'Visiting Jupiter\'s Trojan asteroids. First mission to these primitive bodies.' },
  'CLPS': { full: 'CLPS Lander', desc: 'Commercial Lunar Payload Services delivery to the Moon\'s surface.' },
  'EM1': { full: 'Artemis I Orion', desc: 'Uncrewed test flight of the Orion spacecraft around the Moon.' },
  'EM2': { full: 'Artemis II Orion', desc: 'First crewed Artemis mission flying astronauts around the Moon.' },
};

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

let W, H;
let stations = [];
let connections = [];
let particles = [];
let mouseX = -1, mouseY = -1;
let hoveredSc = null;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// Station positions on screen (spread across bottom)
function getStationPositions() {
  const y = H * 0.82;
  return [
    { id: 'gdscc', name: 'Goldstone', loc: 'California, USA', x: W * 0.2, y },
    { id: 'mdscc', name: 'Madrid', loc: 'Robledo, Spain', x: W * 0.5, y },
    { id: 'cdscc', name: 'Canberra', loc: 'Tidbinbilla, Australia', x: W * 0.8, y },
  ];
}

function formatDistance(km) {
  if (km < 0) return '—';
  if (km < 1000) return km.toFixed(0) + ' km';
  if (km < 1e6) return (km / 1e3).toFixed(0) + ',000 km';
  if (km < 1e9) return (km / 1e6).toFixed(1) + 'M km';
  return (km / 1e9).toFixed(2) + 'B km';
}

function formatLightTime(seconds) {
  if (seconds < 0 || seconds === 0) return '—';
  if (seconds < 60) return seconds.toFixed(1) + 's';
  if (seconds < 3600) return (seconds / 60).toFixed(1) + ' min';
  return (seconds / 3600).toFixed(1) + ' hrs';
}

function parseDSN(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const stationEls = doc.querySelectorAll('station');
  const dishEls = doc.querySelectorAll('dish');
  const positions = getStationPositions();
  const newConnections = [];
  let currentStation = null;

  dishEls.forEach(dish => {
    // Find parent station
    let prev = dish.previousElementSibling;
    while (prev && prev.tagName !== 'station') prev = prev.previousElementSibling;
    if (!prev) {
      // Walk backward through all previous siblings
      let node = dish;
      while (node.previousElementSibling) {
        node = node.previousElementSibling;
        if (node.tagName === 'station') { prev = node; break; }
      }
    }
    if (!prev) return;

    const stationId = prev.getAttribute('name');
    const stationPos = positions.find(p => p.id === stationId);
    if (!stationPos) return;

    const dishName = dish.getAttribute('name');
    const activity = dish.getAttribute('activity');
    const targets = dish.querySelectorAll('target');
    const upSignals = dish.querySelectorAll('upSignal');
    const downSignals = dish.querySelectorAll('downSignal');

    const hasActiveUp = Array.from(upSignals).some(s => s.getAttribute('active') === 'true');
    const hasActiveDown = Array.from(downSignals).some(s => s.getAttribute('active') === 'true');

    targets.forEach(target => {
      const scId = target.getAttribute('name');
      if (scId === 'DSN' || scId === 'DSS' || scId === 'GBRA' || scId === 'TEST') return;

      const range = parseFloat(target.getAttribute('downlegRange'));
      const rtlt = parseFloat(target.getAttribute('rtlt'));
      if (range <= 0) return;

      const maxDataRate = Math.max(
        ...Array.from(downSignals).map(s => parseFloat(s.getAttribute('dataRate')) || 0),
        ...Array.from(upSignals).map(s => parseFloat(s.getAttribute('dataRate')) || 0)
      );

      newConnections.push({
        station: stationPos,
        dish: dishName,
        scId,
        range,
        rtlt,
        hasActiveUp,
        hasActiveDown,
        activity,
        dataRate: maxDataRate,
        // Target position in the "sky" area
        targetX: 0,
        targetY: 0,
      });
    });
  });

  // Deduplicate by scId — keep one entry per unique spacecraft, pick the active one
  const scMap = {};
  newConnections.forEach(c => {
    const key = c.scId;
    if (!scMap[key] || (c.hasActiveUp || c.hasActiveDown)) {
      scMap[key] = c;
    }
  });

  // Position spacecraft in the sky based on distance
  const conns = Object.values(scMap);
  const maxRange = Math.max(...conns.map(c => c.range), 1);

  conns.forEach((c, i) => {
    // Spread across the top portion of the screen
    const logDist = Math.log10(Math.max(c.range, 100));
    const maxLog = Math.log10(Math.max(maxRange, 100));
    const yRatio = 1 - (logDist / maxLog); // closer = lower in sky area
    const skyTop = H * 0.06;
    const skyBottom = H * 0.55;
    c.targetY = skyTop + yRatio * (skyBottom - skyTop);

    // Spread horizontally with some jitter based on station and index
    const stationX = c.station.x;
    const spread = W * 0.25;
    const angle = (i / conns.length) * Math.PI - Math.PI / 2;
    const jitter = ((hashCode(c.scId) % 100) / 100 - 0.5) * spread;
    c.targetX = Math.min(W - 60, Math.max(60, stationX + jitter));
  });

  connections = conns;

  // Update UI
  const activeCount = conns.filter(c => c.hasActiveUp || c.hasActiveDown).length;
  document.getElementById('active-count').textContent = activeCount + ' active links';

  const ts = doc.querySelector('timestamp');
  if (ts) {
    const d = new Date(parseInt(ts.textContent));
    document.getElementById('timestamp').textContent = d.toUTCString().replace('GMT', 'UTC');
  }
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

// Particles for signal animation
function spawnParticles() {
  connections.forEach(c => {
    if (!c.hasActiveUp && !c.hasActiveDown) return;
    if (Math.random() > 0.03) return; // throttle

    const goingUp = c.hasActiveUp && (!c.hasActiveDown || Math.random() > 0.5);
    particles.push({
      x: goingUp ? c.station.x : c.targetX,
      y: goingUp ? c.station.y : c.targetY,
      tx: goingUp ? c.targetX : c.station.x,
      ty: goingUp ? c.station.y : c.targetY,
      progress: 0,
      speed: 0.003 + Math.random() * 0.005,
      color: goingUp ? 'var(--gold)' : 'var(--blue)',
      r: goingUp ? 212 : 91,
      g: goingUp ? 162 : 143,
      b: goingUp ? 106 : 185,
    });
  });
}

function draw(t) {
  ctx.fillStyle = 'rgba(5,7,10,0.15)';
  ctx.fillRect(0, 0, W, H);

  const stationPositions = getStationPositions();

  // Draw connections
  connections.forEach(c => {
    const active = c.hasActiveUp || c.hasActiveDown;
    ctx.beginPath();
    ctx.moveTo(c.station.x, c.station.y);
    ctx.lineTo(c.targetX, c.targetY);
    if (active) {
      const both = c.hasActiveUp && c.hasActiveDown;
      ctx.strokeStyle = both ? 'rgba(106,191,138,0.08)' :
                        c.hasActiveDown ? 'rgba(91,143,185,0.08)' :
                        'rgba(212,162,106,0.08)';
      ctx.lineWidth = 1;
    } else {
      ctx.strokeStyle = 'rgba(45,55,72,0.04)';
      ctx.lineWidth = 0.5;
    }
    ctx.stroke();

    // Spacecraft dot
    const scInfo = SPACECRAFT[c.scId];
    const dotR = active ? 3 : 2;
    ctx.beginPath();
    ctx.arc(c.targetX, c.targetY, dotR, 0, Math.PI * 2);
    ctx.fillStyle = active ? (c.hasActiveUp && c.hasActiveDown ? '#6abf8a' : c.hasActiveDown ? '#5b8fb9' : '#d4a26a') : '#2d3748';
    ctx.fill();

    // Spacecraft label
    const label = scInfo ? scInfo.full : c.scId;
    const shortLabel = label.length > 20 ? c.scId : label;
    ctx.font = '9px "IBM Plex Mono"';
    ctx.fillStyle = active ? 'rgba(200,214,229,0.6)' : 'rgba(74,85,104,0.4)';
    ctx.textAlign = 'center';
    ctx.fillText(shortLabel, c.targetX, c.targetY - 8);

    // Distance label
    if (active) {
      ctx.font = '8px "IBM Plex Mono"';
      ctx.fillStyle = 'rgba(74,85,104,0.5)';
      ctx.fillText(formatDistance(c.range), c.targetX, c.targetY + 14);
    }
  });

  // Draw particles
  spawnParticles();
  particles = particles.filter(p => p.progress < 1);
  particles.forEach(p => {
    p.progress += p.speed;
    const x = p.x + (p.tx - p.x) * p.progress;
    const y = p.y + (p.ty - p.y) * p.progress;
    const alpha = Math.sin(p.progress * Math.PI) * 0.8;

    ctx.beginPath();
    ctx.arc(x, y, 1.5, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${alpha})`;
    ctx.fill();
  });

  // Draw stations
  stationPositions.forEach(s => {
    // Station glow
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 30);
    grad.addColorStop(0, 'rgba(212,162,106,0.12)');
    grad.addColorStop(1, 'rgba(212,162,106,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(s.x - 30, s.y - 30, 60, 60);

    // Station dot
    ctx.beginPath();
    ctx.arc(s.x, s.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#d4a26a';
    ctx.fill();

    // Dish icon ring
    ctx.beginPath();
    ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(212,162,106,0.25)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    ctx.font = '11px "IBM Plex Mono"';
    ctx.fillStyle = var_text;
    ctx.textAlign = 'center';
    ctx.fillText(s.name, s.x, s.y + 24);
    ctx.font = '8px "IBM Plex Mono"';
    ctx.fillStyle = 'rgba(74,85,104,0.7)';
    ctx.fillText(s.loc, s.x, s.y + 36);
  });

  // Tooltip on hover
  checkHover();

  requestAnimationFrame(draw);
}

const var_text = '#c8d6e5';

function checkHover() {
  if (mouseX < 0) return;
  let found = null;
  let minDist = 20;

  connections.forEach(c => {
    const dx = mouseX - c.targetX;
    const dy = mouseY - c.targetY;
    const d = Math.sqrt(dx * dx + dy * dy);
    if (d < minDist) {
      minDist = d;
      found = c;
    }
  });

  if (found) {
    const sc = SPACECRAFT[found.scId];
    document.getElementById('tt-name').textContent = sc ? sc.full : found.scId;
    document.getElementById('tt-meta').textContent = found.dish + ' → ' + found.station.name;

    let detail = '';
    detail += 'Distance: ' + formatDistance(found.range) + '\n';
    detail += 'Light time: ' + formatLightTime(found.rtlt) + '\n';
    if (found.dataRate > 0) detail += 'Data rate: ' + (found.dataRate / 1000).toFixed(1) + ' kb/s\n';
    detail += 'Band: ' + found.activity;
    document.getElementById('tt-detail').textContent = detail;
    document.getElementById('tt-desc').textContent = sc ? sc.desc : '';

    tooltip.style.left = Math.min(mouseX + 16, W - 280) + 'px';
    tooltip.style.top = (mouseY - 20) + 'px';
    tooltip.classList.add('visible');
  } else {
    tooltip.classList.remove('visible');
  }
}

canvas.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});
canvas.addEventListener('mouseleave', () => {
  mouseX = -1;
  tooltip.classList.remove('visible');
});

// Load DSN data
// The XML feed isn't CORS-friendly, so we embed snapshot data and provide
